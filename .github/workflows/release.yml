name: Build & Release

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/release.yml"
  workflow_dispatch:

env:
  FORCE_COLOR: true

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply External Plugins patches
        run: node src/userplugins/pluginLoader/apply-patches.mjs

      - name: Build standalone
        run: pnpm build --standalone

      - name: Compile installer
        shell: pwsh
        run: |
          $csc = Join-Path $env:WINDIR 'Microsoft.NET\Framework64\v4.0.30319\csc.exe'
          & $csc /nologo /optimize+ /target:winexe /platform:anycpu `
            /r:System.Windows.Forms.dll /r:System.Drawing.dll `
            "/resource:dist\patcher.js,patcher.js" `
            "/resource:dist\preload.js,preload.js" `
            "/resource:dist\renderer.js,renderer.js" `
            "/resource:dist\renderer.css,renderer.css" `
            "/out:dist\Install Vencord.exe" `
            scripts\installer-gui.cs
          if ($LASTEXITCODE -ne 0) { throw "csc.exe failed" }

      - name: Get release tag
        shell: bash
        run: echo "RELEASE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Create or update release
        shell: bash
        run: |
          # Create the release if it doesn't exist yet
          gh release create devbuild \
            --title "DevBuild $RELEASE_TAG" \
            --notes $'## Install\nDownload **Install Vencord.exe** and run it.\n\nThe other files are used by the auto-updater.' \
            --latest 2>/dev/null || true

          # Upload / overwrite assets
          gh release upload devbuild --clobber \
            "dist/Install Vencord.exe" \
            dist/patcher.js \
            dist/preload.js \
            dist/renderer.js \
            dist/renderer.css

          # Update release title
          gh release edit devbuild --title "DevBuild $RELEASE_TAG"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
